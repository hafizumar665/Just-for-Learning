<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gym Website</title>
  <link rel="stylesheet" href="gym.css"/>
</head>
<body>

  <!-- Header Section -->
  <header class="header">
    <div class="logo">
      <img src="logo.png" alt="Gym Logo" />
    </div>

    <nav class="navbar">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Machines</a></li>
      </ul>
    </nav>

    <div class="header-buttons">
      <button class="btn">Contact Us</button>
      <button class="btn btn-primary">Register Here</button>
    </div>
  </header>

  <!-- Trainee Detail Section -->
  <section class="trainee-section">
    <div class="form-container">
      <h2>Trainee Registration</h2>
      <form>
        <input type="text" placeholder="Name" required />
        <input type="number" placeholder="Age" required />
        <input type="text" placeholder="Height (e.g., 5'8\")" required />
        <input type="tel" placeholder="Mobile Number" required />
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
    </div>
  </section>

</body>
</html>
